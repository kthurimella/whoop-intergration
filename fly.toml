app = "whoop-health-dashboard"
primary_region = "dfw"

[build]

[env]
  DATABASE_PATH = "/data/tracker.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "data"
  destination = "/data"
