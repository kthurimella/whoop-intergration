<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Trends</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #1a1a1a;
            --border: #2a2a2a;
            --text: #e0e0e0;
            --muted: #888;
            --accent: #4ecdc4;
            --green: #44c767;
            --yellow: #f0c040;
            --red: #e74c3c;
            --blue: #3498db;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 480px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 60px;
        }
        h1 { font-size: 1.4rem; margin-bottom: 16px; }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .card-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            margin-bottom: 10px;
        }
        .chart-wrap {
            position: relative;
            width: 100%;
        }
        a { color: var(--accent); text-decoration: none; }
        .back { display: block; text-align: center; margin-top: 20px; }
        .empty { color: var(--muted); font-size: 0.85rem; text-align: center; padding: 20px 0; }
    </style>
</head>
<body>

<h1>Trends</h1>

<div class="card">
    <div class="card-title">Weight Over Time</div>
    <div class="chart-wrap">
        <canvas id="weightChart"></canvas>
    </div>
    <div id="weightEmpty" class="empty" style="display:none;">Log some weigh-ins to see your trend.</div>
</div>

<div class="card">
    <div class="card-title">Daily Calories</div>
    <div class="chart-wrap">
        <canvas id="calorieChart"></canvas>
    </div>
    <div id="calorieEmpty" class="empty" style="display:none;">Log food to see your calorie trend.</div>
</div>

<div class="card">
    <div class="card-title">Daily Protein</div>
    <div class="chart-wrap">
        <canvas id="proteinChart"></canvas>
    </div>
    <div id="proteinEmpty" class="empty" style="display:none;">Log food with protein to see your trend.</div>
</div>

<a href="/" class="back">Back to Dashboard</a>

<script>
const COLORS = {
    accent: '#4ecdc4',
    green: '#44c767',
    yellow: '#f0c040',
    red: '#e74c3c',
    blue: '#3498db',
    muted: '#888',
    border: '#2a2a2a',
    card: '#1a1a1a',
};

Chart.defaults.color = '#e0e0e0';
Chart.defaults.borderColor = '#2a2a2a';
Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif";

function shortDate(d) {
    const parts = d.split('-');
    return parts[1] + '/' + parts[2];
}

fetch('/api/graph-data')
    .then(r => r.json())
    .then(data => {
        // ── Weight Chart ──
        if (data.weight.dates.length > 0) {
            const ctx = document.getElementById('weightChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.weight.dates.map(shortDate),
                    datasets: [
                        {
                            label: 'Weight (lbs)',
                            data: data.weight.values,
                            borderColor: COLORS.accent,
                            backgroundColor: COLORS.accent + '22',
                            fill: true,
                            tension: 0.3,
                            pointRadius: 3,
                            pointHoverRadius: 6,
                        },
                        {
                            label: 'Goal',
                            data: Array(data.weight.dates.length).fill(data.weight.goal),
                            borderColor: COLORS.green,
                            borderDash: [6, 4],
                            pointRadius: 0,
                            borderWidth: 2,
                        },
                    ],
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: true, position: 'bottom', labels: { boxWidth: 12, padding: 12 } },
                    },
                    scales: {
                        y: {
                            min: Math.min(data.weight.goal, Math.min(...data.weight.values)) - 2,
                            max: Math.max(data.weight.start, Math.max(...data.weight.values)) + 2,
                            grid: { color: '#2a2a2a' },
                        },
                        x: {
                            grid: { display: false },
                            ticks: { maxTicksLimit: 8 },
                        },
                    },
                },
            });
        } else {
            document.getElementById('weightChart').style.display = 'none';
            document.getElementById('weightEmpty').style.display = 'block';
        }

        // ── Calorie Chart ──
        if (data.food.dates.length > 0) {
            const ctx2 = document.getElementById('calorieChart').getContext('2d');
            new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: data.food.dates.map(shortDate),
                    datasets: [
                        {
                            label: 'Calories Eaten',
                            data: data.food.calories,
                            backgroundColor: data.food.calories.map(c =>
                                c <= data.food.calorie_target ? COLORS.green + 'cc' : COLORS.red + 'cc'
                            ),
                            borderRadius: 4,
                        },
                        {
                            label: 'Target',
                            data: Array(data.food.dates.length).fill(data.food.calorie_target),
                            type: 'line',
                            borderColor: COLORS.yellow,
                            borderDash: [6, 4],
                            pointRadius: 0,
                            borderWidth: 2,
                        },
                    ],
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: true, position: 'bottom', labels: { boxWidth: 12, padding: 12 } },
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            min: Math.max(0, Math.min(...data.food.calories) - 300),
                            grid: { color: '#2a2a2a' },
                        },
                        x: {
                            grid: { display: false },
                            ticks: { maxTicksLimit: 8 },
                        },
                    },
                },
            });
        } else {
            document.getElementById('calorieChart').style.display = 'none';
            document.getElementById('calorieEmpty').style.display = 'block';
        }

        // ── Protein Chart ──
        if (data.food.dates.length > 0) {
            const ctx3 = document.getElementById('proteinChart').getContext('2d');
            new Chart(ctx3, {
                type: 'bar',
                data: {
                    labels: data.food.dates.map(shortDate),
                    datasets: [
                        {
                            label: 'Protein (g)',
                            data: data.food.protein,
                            backgroundColor: data.food.protein.map(p =>
                                p >= data.food.protein_target ? COLORS.green + 'cc' : COLORS.blue + 'cc'
                            ),
                            borderRadius: 4,
                        },
                        {
                            label: 'Target',
                            data: Array(data.food.dates.length).fill(data.food.protein_target),
                            type: 'line',
                            borderColor: COLORS.yellow,
                            borderDash: [6, 4],
                            pointRadius: 0,
                            borderWidth: 2,
                        },
                    ],
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: true, position: 'bottom', labels: { boxWidth: 12, padding: 12 } },
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#2a2a2a' },
                        },
                        x: {
                            grid: { display: false },
                            ticks: { maxTicksLimit: 8 },
                        },
                    },
                },
            });
        } else {
            document.getElementById('proteinChart').style.display = 'none';
            document.getElementById('proteinEmpty').style.display = 'block';
        }
    });
</script>

</body>
</html>
